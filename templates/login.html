{% extends "base.html" %}

{% block content %}

<div class="flex items-center justify-center h-screen">

<div class="bg-white p-10 rounded-xl shadow w-96">

<h2 class="text-2xl font-bold mb-6 text-center">
Login
</h2>

<form method="POST">

<input
name="username"
placeholder="Username"
class="border w-full p-3 mb-4 rounded"
/>

<input
type="password"
name="password"
placeholder="Password"
class="border w-full p-3 mb-4 rounded"
/>

<button
class="bg-blue-600 text-white w-full p-3 rounded"
>
Login
</button>

</form>

</div>

</div>

{% endblock %}
